name: publish-carousel

# Publica o carrossel do dia no Instagram (@gfwealth_) via Graph API.
# Datas: 12/06->c1, 13/06->c2, 14/06->c3, 15/06->c4 (horario de Brasilia).
on:
  schedule:
    - cron: '0 10 * * *'    # 07:00 BRT (primario) -> o job dorme ate 08:00 BRT
    - cron: '30 11 * * *'   # 08:30 BRT (recuperacao) -> roda so se o primario falhou
  workflow_dispatch:
    inputs:
      carousel:
        description: 'Forcar carrossel (c1/c2/c3/c4). Vazio = pela data.'
        required: false
        default: ''
      dry_run:
        description: 'true = cria os conteineres mas NAO publica (teste)'
        required: false
        default: 'false'
      skip_sleep:
        description: 'true = nao dorme ate 08:00 (teste)'
        required: false
        default: 'false'
      diagnose:
        description: 'true = so imprime as contas/IG ids do token e sai'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publicar carrossel do dia
        env:
          IG_USER_ID: ${{ vars.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          GRAPH_VERSION: v25.0
          FORCE: ${{ github.event.inputs.carousel }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SKIP_SLEEP: ${{ github.event.inputs.skip_sleep }}
          DIAGNOSE: ${{ github.event.inputs.diagnose }}
        run: |
          set -euo pipefail
          G="https://graph.facebook.com/${GRAPH_VERSION}"
          [ -z "${IG_TOKEN:-}" ] && { echo "::error::IG_ACCESS_TOKEN (secret) nao definido"; exit 1; } || true

          if [ "${DIAGNOSE:-false}" = "true" ]; then
            echo "===== /me ====="
            curl -sg "$G/me?fields=id,name&access_token=${IG_TOKEN}" | jq -c .
            ACC=$(curl -sg "$G/me/accounts?fields=name,id,instagram_business_account{id,username}&access_token=${IG_TOKEN}")
            echo "===== paginas acessiveis ====="
            echo "$ACC" | jq -c '.data'
            IGID=$(echo "$ACC" | jq -r '.data // [] | map(.instagram_business_account // empty) | map(select(.username=="gfwealth_")) | .[0].id // empty')
            if [ -n "$IGID" ]; then
              echo "GFWEALTH_FOUND id=$IGID"
            else
              echo "GFWEALTH_NOT_FOUND (o @gfwealth_ ainda nao esta acessivel a este token)"
            fi
            echo "===== fim diagnostico ====="
            exit 0
          fi

          # Descobre o IG_USER_ID do @gfwealth_ a partir do token (auto; nao depende de variavel fixa)
          IG_USER_ID=$(curl -sg "$G/me/accounts?fields=instagram_business_account{id,username}&access_token=${IG_TOKEN}" | jq -r '.data // [] | map(.instagram_business_account // empty) | map(select(.username=="gfwealth_")) | .[0].id // empty')
          if [ -z "$IG_USER_ID" ]; then
            echo "::warning::@gfwealth_ ainda nao acessivel a este token (estrutura do Meta nao liberou). Nada a publicar; encerrando OK."
            exit 0
          fi
          echo "IG_USER_ID (descoberto): $IG_USER_ID"

          today=$(TZ=America/Sao_Paulo date +%F)
          car="${FORCE:-}"
          if [ -z "$car" ]; then
            case "$today" in
              # 2026-06-12 (c1) e' publicado MANUALMENTE pelo Guilherme no Business Suite.
              2026-06-13) car=c2;;
              2026-06-14) car=c3;;
              2026-06-15) car=c4;;
              *) echo "Sem carrossel agendado para hoje ($today). Encerrando."; exit 0;;
            esac
          fi
          echo "Data BRT: $today | Carrossel: $car"

          if [ -f "published/${car}.done" ]; then
            echo "Ja publicado ($car): $(cat published/${car}.done). Encerrando."
            exit 0
          fi

          # Dorme ate 08:00 BRT (a nao ser que skip_sleep)
          if [ "${SKIP_SLEEP:-false}" != "true" ]; then
            target=$(TZ=America/Sao_Paulo date -d 'today 08:00:00' +%s)
            now=$(date +%s)
            if [ "$now" -lt "$target" ]; then
              echo "Dormindo $((target-now))s ate 08:00 BRT..."
              sleep $((target-now))
            fi
          fi

          # 1) Um conteiner-item por slide, na ordem (slide01 = capa)
          children=""
          for f in $(ls "${car}"/*.png | sort); do
            url="https://raw.githubusercontent.com/${REPO}/${SHA}/${f}"
            echo "-> item: $url"
            resp=$(curl -s -X POST "$G/${IG_USER_ID}/media" \
              --data-urlencode "image_url=${url}" \
              -d "is_carousel_item=true" \
              -d "access_token=${IG_TOKEN}")
            id=$(echo "$resp" | jq -r '.id // empty')
            [ -z "$id" ] && { echo "::error::Falha no item ${f}: $resp"; exit 1; } || true
            children="${children:+$children,}$id"
          done
          echo "Itens: $children"

          # 2) Conteiner do carrossel com a legenda integra
          caption=$(cat "captions/${car}.txt")
          cresp=$(curl -s -X POST "$G/${IG_USER_ID}/media" \
            --data-urlencode "caption=${caption}" \
            -d "media_type=CAROUSEL" \
            -d "children=${children}" \
            -d "access_token=${IG_TOKEN}")
          cid=$(echo "$cresp" | jq -r '.id // empty')
          [ -z "$cid" ] && { echo "::error::Falha no conteiner do carrossel: $cresp"; exit 1; } || true
          echo "Conteiner: $cid"

          # 3) Espera ficar FINISHED
          st=""
          for i in $(seq 1 40); do
            st=$(curl -s "$G/${cid}?fields=status_code&access_token=${IG_TOKEN}" | jq -r '.status_code // empty')
            echo "status_code: ${st:-?} (tentativa $i)"
            [ "$st" = "FINISHED" ] && break
            if [ "$st" = "ERROR" ]; then
              echo "::error::Conteiner em ERROR: $(curl -s "$G/${cid}?fields=status&access_token=${IG_TOKEN}")"; exit 1
            fi
            sleep 6
          done
          [ "$st" != "FINISHED" ] && { echo "::error::Conteiner nao ficou FINISHED a tempo (status=$st)"; exit 1; } || true

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "DRY RUN OK -- conteineres criados e validos, NAO publicando. Tudo pronto p/ o agendado."
            exit 0
          fi

          # 4) Publica
          presp=$(curl -s -X POST "$G/${IG_USER_ID}/media_publish" \
            -d "creation_id=${cid}" \
            -d "access_token=${IG_TOKEN}")
          pid=$(echo "$presp" | jq -r '.id // empty')
          [ -z "$pid" ] && { echo "::error::Falha ao publicar: $presp"; exit 1; } || true
          echo "PUBLICADO! media id: $pid"

          # 5) Marca como publicado (idempotencia entre runs)
          mkdir -p published
          echo "$pid @ $(date -u +%FT%TZ)" > "published/${car}.done"
          git config user.name "carousel-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "published/${car}.done"
          git commit -q -m "publicado ${car}: ${pid}"
          git push
